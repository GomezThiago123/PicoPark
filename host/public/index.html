<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pico Park</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; max-width: 100vw; max-height: 100vh; object-fit: contain; }

    #overlay {
      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10, 10, 30, 0.95);
      border: 2px solid #FFD700;
      padding: 40px 50px;
      border-radius: 14px;
      text-align: center;
      z-index: 100;
      font-family: monospace;
    }
    #overlayTitle { color: #FFD700; font-size: 26px; margin-bottom: 18px; }
    #overlaySubtitle { color: #aaa; font-size: 14px; margin-bottom: 28px; }
    #overlayBtn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 18px;
      font-family: monospace;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #overlayBtn:hover { background: #c0392b; }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1200" height="600"></canvas>

  <div id="overlay">
    <div id="overlayTitle"></div>
    <div id="overlaySubtitle"></div>
    <button id="overlayBtn"></button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
</body>
</html>
